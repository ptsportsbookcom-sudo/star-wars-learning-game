<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Star Wars Learning Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="voiceEnablePrompt" class="voice-enable-prompt hidden">
      Tap anywhere once to enable voice
    </div>
    <main class="container">
      <h1>Star Wars Learning Game</h1>
      <div class="controls">
        <button id="startGameBtn" type="button">Start Game</button>
        <button id="startListeningBtn" type="button">Start Listening</button>
      </div>
      <div class="voice-panel">
        <label for="languageSelect">Recognition Language</label>
        <select id="languageSelect">
          <option value="en-US">English</option>
          <option value="el-GR">Greek</option>
        </select>
        <p class="hint">
          Try saying: "start game" or "ξεκίνα παιχνίδι"
        </p>
        <p id="listeningStatus">Status: Idle</p>
        <p id="transcript">You said: ...</p>
        <p id="selectionResult">You chose: ...</p>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
  </html>
